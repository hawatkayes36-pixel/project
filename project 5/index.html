<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نموذج استشارة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<nav class="navbar navbar-light bg-light shadow-sm"><div class="container"><a class="navbar-brand fw-bold" href="#"><i class="fas fa-handshake me-2"></i>استشارة</a><a href="index.html" class="btn btn-outline-primary btn-sm">الرئيسية</a></div></nav>
<main class="container my-4" style="max-width: 600px;">
    <div class="card shadow-sm p-4">
    <h3 class="text-center mb-3"><i class="fas fa-pen-fancy text-primary"></i> نموذج الاستشارة</h3>
    <form id="consultForm">
        <div class="mb-3"><label class="form-label">الاسم الكامل</label><input type="text" class="form-control" id="fullName" placeholder="أدخل اسمك" required></div>
        <div class="mb-3"><label class="form-label">البريد الإلكتروني</label><input type="email" class="form-control" id="emailAddr" placeholder="name@example.com" required></div>
        <div class="mb-3"><label class="form-label">موضوع الاستشارة</label><select class="form-select" id="consultTopic"><option value="تقني">تقني</option><option value="تصميم">تصميم</option><option value="تسويق">تسويق</option><option value="أخرى">أخرى</option></select></div>
        <div class="mb-3"><label class="form-label">الرسالة</label><textarea class="form-control" id="consultMsg" rows="3" placeholder="اكتب تفاصيل استشارتك..." required></textarea></div>
        <button type="submit" class="btn btn-primary w-100"><i class="fas fa-paper-plane me-1"></i> إرسال الاستشارة</button>
        <div id="formFeedback" class="mt-3 text-center fw-bold"></div>
    </form>
    </div>
</main>
<footer class="text-center py-3 bg-light"><div class="container">© 2026 استشارات</div></footer>
<script>
    document.getElementById('consultForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const name = document.getElementById('fullName').value.trim();
    const email = document.getElementById('emailAddr').value.trim();
    const msg = document.getElementById('consultMsg').value.trim();
    const feedback = document.getElementById('formFeedback');
    if (name === '' || email === '' || msg === '') {
        feedback.innerHTML = '<span class="text-danger"><i class="fas fa-exclamation-circle"></i> جميع الحقول مطلوبة!</span>';
        return;
    }
    feedback.innerHTML = '<span class="text-success"><i class="fas fa-check-circle"></i> تم إرسال طلب الاستشارة بنجاح! سنتواصل معك قريباً.</span>';
    this.reset();
    setTimeout(() => { feedback.innerHTML = ''; }, 5000);
    });
</script>
</body>
</html>
