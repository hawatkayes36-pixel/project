<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>حاسبة بسيطة</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
    .calc-btn { width: 100%; padding: 15px; font-size: 1.2rem; }
    .calc-display { background: #f8f9fa; padding: 15px; font-size: 2rem; text-align: left; direction: ltr; border-radius: 8px; min-height: 80px; }
</style>
</head>
<body>
<nav class="navbar navbar-light bg-light shadow-sm"><div class="container"><a class="navbar-brand fw-bold" href="#"><i class="fas fa-calculator me-2"></i>الحاسبة</a><a href="index.html" class="btn btn-outline-primary btn-sm">الرئيسية</a></div></nav>
<main class="container my-4" style="max-width: 400px;">
    <div class="card shadow-sm p-3">
    <div class="calc-display mb-3" id="display">0</div>
    <div class="row g-2">
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="7">7</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="8">8</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="9">9</button></div>
        <div class="col-3"><button class="btn btn-warning calc-btn" data-value="/">÷</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="4">4</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="5">5</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="6">6</button></div>
        <div class="col-3"><button class="btn btn-warning calc-btn" data-value="*">×</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="1">1</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="2">2</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="3">3</button></div>
        <div class="col-3"><button class="btn btn-warning calc-btn" data-value="-">−</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value="0">0</button></div>
        <div class="col-3"><button class="btn btn-secondary calc-btn" data-value=".">.</button></div>
        <div class="col-3"><button class="btn btn-danger calc-btn" id="clearBtn">C</button></div>
        <div class="col-3"><button class="btn btn-warning calc-btn" data-value="+">+</button></div>
        <div class="col-12"><button class="btn btn-success calc-btn" id="equalBtn">=</button></div>
    </div>
    </div>
</main>
<script>
    const display = document.getElementById('display');
    let currentInput = '0';
    let operator = null;
    let previousValue = null;
    let resetDisplay = false;

    function updateDisplay() { display.textContent = currentInput; }

    document.querySelectorAll('.calc-btn[data-value]').forEach(btn => {
    btn.addEventListener('click', function() {
        const value = this.getAttribute('data-value');
        if (resetDisplay) { currentInput = ''; resetDisplay = false; }
        if (value === '.' && currentInput.includes('.')) return;
        currentInput += value;
        updateDisplay();
    });
    });

    document.querySelectorAll('.calc-btn[data-value="+"], .calc-btn[data-value="-"], .calc-btn[data-value="*"], .calc-btn[data-value="/"]').forEach(btn => {
    btn.addEventListener('click', function() {
        const op = this.getAttribute('data-value');
        if (operator && !resetDisplay) {
        calculate();
        }
        previousValue = parseFloat(currentInput);
        operator = op;
        resetDisplay = true;
    });
    });

    document.getElementById('equalBtn').addEventListener('click', calculate);
    document.getElementById('clearBtn').addEventListener('click', function() {
    currentInput = '0';
    operator = null;
    previousValue = null;
    resetDisplay = false;
    updateDisplay();
    });

    function calculate() {
    if (operator === null || previousValue === null) return;
    const current = parseFloat(currentInput);
    let result;
    switch(operator) {
        case '+': result = previousValue + current; break;
        case '-': result = previousValue - current; break;
        case '*': result = previousValue * current; break;
        case '/': result = previousValue / current; break;
        default: return;
    }
    currentInput = String(result);
    operator = null;
    previousValue = null;
    resetDisplay = true;
    updateDisplay();
    }
    updateDisplay();
</script>
</body>
</html>
