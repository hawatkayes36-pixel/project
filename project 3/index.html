<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر المنتجات</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar navbar-light bg-light shadow-sm"><div class="container"><a class="navbar-brand fw-bold" href="#"><i class="fas fa-store me-2"></i>متجري</a><a href="index.html" class="btn btn-outline-primary btn-sm">الرئيسية</a></div></nav>
<main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3"><h2>منتجاتنا</h2><span class="badge bg-primary fs-6"><i class="fas fa-shopping-cart"></i> السلة: <span id="cartCount">0</span></span></div>
    <div class="row g-4">
    <div class="col-md-3 col-sm-6"><div class="card h-100 text-center"><div class="card-body"><i class="fas fa-laptop fa-3x text-primary"></i><h5 class="mt-2">لابتوب</h5><p class="text-muted">$899</p><button class="btn btn-success btn-sm add-to-cart" data-product="لابتوب">أضف إلى السلة</button></div></div></div>
    <div class="col-md-3 col-sm-6"><div class="card h-100 text-center"><div class="card-body"><i class="fas fa-headphones fa-3x text-primary"></i><h5 class="mt-2">سماعات</h5><p class="text-muted">$199</p><button class="btn btn-success btn-sm add-to-cart" data-product="سماعات">أضف إلى السلة</button></div></div></div>
    <div class="col-md-3 col-sm-6"><div class="card h-100 text-center"><div class="card-body"><i class="fas fa-tablet fa-3x text-primary"></i><h5 class="mt-2">تابلت</h5><p class="text-muted">$499</p><button class="btn btn-success btn-sm add-to-cart" data-product="تابلت">أضف إلى السلة</button></div></div></div>
    <div class="col-md-3 col-sm-6"><div class="card h-100 text-center"><div class="card-body"><i class="fas fa-mobile-alt fa-3x text-primary"></i><h5 class="mt-2">هاتف</h5><p class="text-muted">$699</p><button class="btn btn-success btn-sm add-to-cart" data-product="هاتف">أضف إلى السلة</button></div></div></div>
    </div>
    <div id="cartMessage" class="mt-3"></div>
</main>
<footer class="text-center py-3 bg-light"><div class="container">© 2026 متجري</div></footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let cartCount = 0;
    const cartCountEl = document.getElementById('cartCount');
    const cartMessage = document.getElementById('cartMessage');
    document.querySelectorAll('.add-to-cart').forEach(btn => {
    btn.addEventListener('click', function() {
        const product = this.getAttribute('data-product');
        cartCount++;
        cartCountEl.textContent = cartCount;
        cartMessage.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> تم إضافة <strong>${product}</strong> إلى السلة (المجموع: ${cartCount})</div>`;
        setTimeout(() => { cartMessage.innerHTML = ''; }, 3000);
    });
    });
</script>
</body>
</html>
